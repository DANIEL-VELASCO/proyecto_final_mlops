services:

  # ── Persona 1 ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: ${POSTGRES_DB:-mlops}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build: ./airflow
    container_name: mlops-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-zTJpbGAhiJfJvFTtUjRQ-G7LMgG4-rVFqtMYyObFQ9Y=}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # ── Persona 1: Data API ──
      DATA_API_HOST: data-api
      DATA_API_PORT: "80"
      DATA_API_GROUP_ID: "${DATA_API_GROUP_ID:-1}"
      DATA_API_TIMEOUT: "30"
      DATA_API_MAX_RETRIES: "3"
      # ── Persona 1: Base de datos ──
      DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      POSTGRES_USER: "${POSTGRES_USER:-mlops}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mlops}"
      POSTGRES_DB: "${POSTGRES_DB:-mlops}"
      # ── Persona 1: Criterios de entrenamiento ──
      MIN_RECORDS_TO_TRAIN: "${MIN_RECORDS_TO_TRAIN:-100}"
      VOLUME_INCREASE_PCT: "${VOLUME_INCREASE_PCT:-0.10}"
      DRIFT_PVALUE_THRESHOLD: "${DRIFT_PVALUE_THRESHOLD:-0.05}"
      NEW_CATEGORY_FREQ_THRESHOLD: "${NEW_CATEGORY_FREQ_THRESHOLD:-0.05}"
      # ── Persona 1: Imagen de training (P2) ──
      TRAINING_IMAGE: "${TRAINING_IMAGE:-danielvelasco01/mlops-training:latest}"
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "18080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  # ── Persona 2 ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlops-mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "15000:5000"

  fastapi:
    build: ./fastapi
    container_name: mlops-fastapi
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-house-price-model}
      MLFLOW_PRODUCTION_ALIAS: ${MLFLOW_PRODUCTION_ALIAS:-production}
      MODEL_POLL_INTERVAL_SEC: ${MODEL_POLL_INTERVAL_SEC:-30}
      RELOAD_TOKEN: ${RELOAD_TOKEN:-}
      INFERENCE_EVENTS_TABLE: ${INFERENCE_EVENTS_TABLE:-raw_data.inference_events}
    ports:
      - "8000:8000"

  # P2 — invocable manualmente con perfil 'training':
  #   docker compose --profile training run --rm training train --batch-id local-001 --training-reason "smoke" ...
  training:
    build: ./training
    container_name: mlops-training
    profiles: ["training"]
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-house-price}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-house-price-model}

  # ── Persona 3 ──────────────────────────────────────────────
  streamlit:
    build: ./streamlit
    container_name: mlops-streamlit
    depends_on:
      - fastapi
    environment:
      FASTAPI_URL: http://fastapi:8000
      DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
    ports:
      - "8501:8501"

  prometheus:
    image: prom/prometheus:latest
    container_name: mlops-prometheus
    volumes:
      - ./kubernetes/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: mlops-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "13000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  # ── API de datos externa ───────────────────────────────────
  data-api:
    image: cristiandiaz13/mlops-puj:data-api-pf-v1
    container_name: mlops-data-api
    ports:
      - "18001:80"

volumes:
  postgres_data:
  minio_data:
  grafana_data:
