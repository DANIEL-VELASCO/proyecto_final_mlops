apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: mlops
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: mlops
        folder: MLOps
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
