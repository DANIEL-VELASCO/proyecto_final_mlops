apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mlops
  namespace: mlops
data:
  mlops-dashboard.json: |
    {
      "title": "MLOps FastAPI Dashboard",
      "uid": "mlops-fastapi",
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["mlops"],
      "panels": [
        {
          "id": 1,
          "title": "Total de Peticiones",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "sum(http_requests_total{job=\"fastapi\"})",
            "legendFormat": "Total"
          }]
        },
        {
          "id": 2,
          "title": "Tasa de Peticiones (req/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(http_requests_total{job=\"fastapi\"}[1m]))",
            "legendFormat": "req/s"
          }]
        },
        {
          "id": 3,
          "title": "Latencia de Inferencia (p50 / p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"fastapi\"}[1m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"fastapi\"}[1m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 4,
          "title": "Tasa de Errores (5xx)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "sum(rate(http_requests_total{job=\"fastapi\", status=~\"5..\"}[1m]))",
            "legendFormat": "errores/s"
          }]
        },
        {
          "id": 5,
          "title": "Versión del Modelo Productivo",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{
            "expr": "model_version_info{job=\"fastapi\"}",
            "legendFormat": "{{version}}"
          }]
        }
      ]
    }
