apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api
  namespace: mlops
  labels:
    app: data-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-api
  template:
    metadata:
      labels:
        app: data-api
    spec:
      containers:
        - name: data-api
          image: cristiandiaz13/mlops-puj:data-api-pf-v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: data-api
  namespace: mlops
spec:
  selector:
    app: data-api
  ports:
    - port: 80
      targetPort: 80
