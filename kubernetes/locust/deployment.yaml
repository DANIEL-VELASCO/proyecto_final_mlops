apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.28.0
          imagePullPolicy: IfNotPresent
          args: ["-f", "/locust/locustfile.py", "--host", "http://fastapi-service:8000"]
          volumeMounts:
            - name: locustfile
              mountPath: /locust
          ports:
            - containerPort: 8089
          env:
            - name: LOCUST_HOST
              value: "http://fastapi-service:8000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: locustfile
          configMap:
            name: locustfile-config
