# DESARROLLO: reemplazar valores antes de desplegar en producción
#
# NOTAS:
# - Hostnames coinciden con los Services *-service (mlflow-service, postgres-service,
#   minio-service, fastapi-service) que existen en el clúster.
# - Las credenciales de MinIO (minio_admin/minio_secret123) coinciden con las del
#   Secret legacy 'mlops-secrets' para evitar invalidar artefactos ya almacenados.
# - El rol mlops_user existe como alias del mlops en postgres (ver scripts/k8s/bootstrap_roles.sql).
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: mlops
type: Opaque
stringData:
  POSTGRES_USER: mlops
  POSTGRES_PASSWORD: mlops_pass
  POSTGRES_DB: mlops

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: mlops
type: Opaque
stringData:
  MINIO_ROOT_USER: minio_admin
  MINIO_ROOT_PASSWORD: minio_secret123

---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: mlops
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minio_admin
  AWS_SECRET_ACCESS_KEY: minio_secret123
  MLFLOW_S3_ENDPOINT_URL: http://minio-service:9000
  BACKEND_STORE_URI: postgresql+psycopg2://mlops_user:mlops_pass@postgres-service:5432/mlflow

---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: mlops
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: http://mlflow-service:5000
  DATABASE_URI: postgresql+psycopg2://mlops_user:mlops_pass@postgres-service:5432/mlops
  MLFLOW_S3_ENDPOINT_URL: http://minio-service:9000
  AWS_ACCESS_KEY_ID: minio_admin
  AWS_SECRET_ACCESS_KEY: minio_secret123
  MLFLOW_MODEL_NAME: house-price-model
  MLFLOW_PRODUCTION_ALIAS: production
  MODEL_POLL_INTERVAL_SEC: "30"
  INFERENCE_EVENTS_TABLE: raw_data.inference_events
  RELOAD_TOKEN: 7c9f4e6a-5d3b-4c8e-9a2f-1d5b6e8f3c4a

---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secret
  namespace: mlops
type: Opaque
stringData:
  # Metadata DB de Airflow:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops_user:mlops_pass@postgres-service:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: zTJpbGAhiJfJvFTtUjRQ-G7LMgG4-rVFqtMYyObFQ9Y=
  AIRFLOW__WEBSERVER__SECRET_KEY: mlops-secret-key-2026
  # Variables que el DAG (P1) lee desde os.getenv() en main_pipeline.py:
  DATABASE_URI: postgresql+psycopg2://mlops_user:mlops_pass@postgres-service:5432/mlops
  MLFLOW_TRACKING_URI: http://mlflow-service:5000
  MLFLOW_S3_ENDPOINT_URL: http://minio-service:9000
  AWS_ACCESS_KEY_ID: minio_admin
  AWS_SECRET_ACCESS_KEY: minio_secret123

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: mlops
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: admin123
