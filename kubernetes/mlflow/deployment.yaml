apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 3; done']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: wait-for-minio
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z minio 9000; do echo waiting for minio; sleep 3; done']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - mlflow
            - server
            - --backend-store-uri
            - $(BACKEND_STORE_URI)
            - --artifacts-destination
            - s3://mlflow-artifacts
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: mlflow-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 20
