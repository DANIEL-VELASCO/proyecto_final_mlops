apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres-service; sleep 3; done']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: airflow-db-init
          image: mlops-airflow:local
          imagePullPolicy: Never
          command: ['airflow', 'db', 'migrate']
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
        # Asegura que el socket Docker sea accesible al usuario airflow (uid 50000).
        # Sin esto, /var/run/docker.sock pertenece a root y los `docker run` del DAG
        # fallarian con "permission denied".
        - name: fix-docker-sock-perms
          image: busybox:1.35
          command: ['sh', '-c', 'chmod 666 /var/run/docker.sock || true']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: airflow-webserver
          image: mlops-airflow:local
          imagePullPolicy: Never
          command: ['airflow', 'webserver']
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 800m
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
        - name: airflow-scheduler
          image: mlops-airflow:local
          imagePullPolicy: Never
          command: ['airflow', 'scheduler']
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 4Gi
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: airflow-logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
        # Acceso al daemon Docker del host para que el DAG pueda `docker run` la
        # imagen de training. Funciona en Docker Desktop K8s; en otros clusters
        # conviene migrar a KubernetesPodOperator.
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
