apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres-service; sleep 3; done']
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: airflow-db-init
          image: mlops-airflow:local   # imagen local con DAGs y deps de P1 (build manual; cambiar a tag publicado cuando CI funcione)
          imagePullPolicy: Never
          command: ['airflow', 'db', 'migrate']
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      containers:
        - name: airflow-webserver
          image: mlops-airflow:local   # imagen local con DAGs y deps de P1 (build manual; cambiar a tag publicado cuando CI funcione)
          imagePullPolicy: Never
          command: ['airflow', 'webserver']
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 800m
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
        - name: airflow-scheduler
          image: mlops-airflow:local   # imagen local con DAGs y deps de P1 (build manual; cambiar a tag publicado cuando CI funcione)
          imagePullPolicy: Never
          command: ['airflow', 'scheduler']
          envFrom:
            - secretRef:
                name: airflow-secret
            - configMapRef:
                name: airflow-p1-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
      volumes:
        - name: airflow-logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
