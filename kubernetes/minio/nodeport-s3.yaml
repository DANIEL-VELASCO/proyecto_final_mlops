apiVersion: v1
kind: Service
metadata:
  name: minio-nodeport
  namespace: mlops
  annotations:
    description: "NodePort S3 para acceso desde containers Docker del training DAG"
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900
